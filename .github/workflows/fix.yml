            "    app.add_handler(CommandHandler(" + q + "profile" + q + ", handle_profile))\n"
            "    app.add_handler(age_conv)\n"
            "    app.add_handler(gender_conv)\n"
            "    app.add_handler(MessageHandler(filters.PHOTO, handle_photo))\n"
            "    app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle_text))\n"
            "    logger.info(" + q + "\u0411\u043e\u0442 \u0437\u0430\u043f\u0443\u0449\u0435\u043d" + q + ")\n"
            "    app.run_polling(allowed_updates=Update.ALL_TYPES)\n"
            "\n"
            "if __name__ == " + q + "__main__" + q + ":\n"
            "    main()\n"
          )

          for filename, content in files.items():
              with open(filename, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Written: " + filename)

          print("All done!")
          EOF

      - name: Verify no smart quotes
        run: |
          python3 -c "
          import sys
          bad = [chr(0x2018), chr(0x2019), chr(0x201C), chr(0x201D)]
          files = ['bot.py', 'claude_client.py', 'database.py', 'config.py']
          ok = True
          for f in files:
              text = open(f, encoding='utf-8').read()
              for ch in bad:
                  if ch in text:
                      print('BAD CHAR in ' + f + ': ' + repr(ch))
                      ok = False
          if ok:
              print('All files clean - no smart quotes found')
          else:
              sys.exit(1)
          "

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add bot.py claude_client.py database.py config.py requirements.txt Procfile
          git diff --staged --quiet || git commit -m "fix: rewrite all files in Russian, clean ASCII [skip ci]"
          git push
