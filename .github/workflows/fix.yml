            "    else:\n"
            "        await update.message.reply_text(" + q + "\u041f\u043e\u0436\u0430\u043b\u0443\u0439\u0441\u0442\u0430, \u0432\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u041c\u0443\u0436\u0441\u043a\u043e\u0439 \u0438\u043b\u0438 \u0416\u0435\u043d\u0441\u043a\u043e\u0439" + q + ")\n"
