            "    if " + q + "\u0438\u0441\u0442\u043e\u0440\u0438\u044f" + q + " in tl:\n"
            "        await handle_history(update, context)\n"
            "        return\n"
            "\n"
            "    expecting = context.user_data.get(" + q + "expecting" + q + ")\n"
            "    if expecting in [" + q + "\u0432\u0435\u0441" + q + ", " + q + "\u043f\u0438\u0442\u0430\u043d\u0438\u0435" + q + ", " + q + "\u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c" + q + "]:\n"
            "        save_health_record(user_id, expecting, text)\n"
            "        context.user_data.pop(" + q + "expecting" + q + ", None)\n"
            "        history = get_conversation_history(user_id, limit=10)\n"
            "        msgs = [{" + q + "role" + q + ": m[" + q + "role" + q + "], " + q + "content" + q + ": m[" + q + "content" + q + "]} for m in history]\n"
            "        msgs.append({" + q + "role" + q + ": " + q + "user" + q + ", " + q + "content" + q + ": " + q + "\u042f \u0437\u0430\u043f\u0438\u0441\u0430\u043b " + q + " + expecting + " + q + ": " + q + " + text + " + q + ". \u041f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u0443\u0439 \u043a\u0440\u0430\u0442\u043a\u043e." + q + "})\n"
            "        response = chat_with_claude(msgs, user_info)\n"
            "        save_conversation(user_id, " + q + "user" + q + ", expecting + " + q + ": " + q + " + text)\n"
            "        save_conversation(user_id, " + q + "assistant" + q + ", response)\n"
            "        await update.message.reply_text(response, reply_markup=MAIN_KB)\n"
            "        return\n"
            "\n"
            "    history = get_conversation_history(user_id, limit=20)\n"
            "    msgs = [{" + q + "role" + q + ": m[" + q + "role" + q + "], " + q + "content" + q + ": m[" + q + "content" + q + "]} for m in history]\n"
            "    msgs.append({" + q + "role" + q + ": " + q + "user" + q + ", " + q + "content" + q + ": text})\n"
            "    save_conversation(user_id, " + q + "user" + q + ", text)\n"
            "    try:\n"
            "        response = chat_with_claude(msgs, user_info)\n"
            "        save_conversation(user_id, " + q + "assistant" + q + ", response)\n"
            "        await update.message.reply_text(response, reply_markup=MAIN_KB)\n"
            "    except Exception as e:\n"
            "        logger.error(" + q + "Claude error: " + q + " + str(e))\n"
            "        await update.message.reply_text(" + q + "\u041f\u0440\u043e\u0438\u0437\u043e\u0448\u043b\u0430 \u043e\u0448\u0438\u0431\u043a\u0430. \u041f\u043e\u043f\u0440\u043e\u0431\u0443\u0439\u0442\u0435 \u0435\u0449\u0451 \u0440\u0430\u0437." + q + ", reply_markup=MAIN_KB)\n"
            "\n"
            "def main():\n"
            "    init_db()\n"
            "    app = Application.builder().token(TELEGRAM_TOKEN).build()\n"
            "    age_conv = ConversationHandler(\n"
            "        entry_points=[CommandHandler(" + q + "setage" + q + ", set_age)],\n"
            "        states={SETTING_AGE: [MessageHandler(filters.TEXT & ~filters.COMMAND, receive_age)]},\n"
            "        fallbacks=[]\n"
