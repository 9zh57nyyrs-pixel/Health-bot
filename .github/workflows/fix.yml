            "        context.user_data[" + q + "expecting" + q + "] = " + q + "\u043f\u0438\u0442\u0430\u043d\u0438\u0435" + q + "\n"
            "        return\n"
            "    if " + q + "\u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c" + q + " in tl:\n"
            "        await update.message.reply_text(" + q + "\u041e\u043f\u0438\u0448\u0438\u0442\u0435 \u0432\u0430\u0448\u0443 \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0443\u044e \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c:" + q + ")\n"
            "        context.user_data[" + q + "expecting" + q + "] = " + q + "\u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c" + q + "\n"
            "        return\n"
            "    if " + q + "\u0430\u043d\u0430\u043b\u0438\u0437" + q + " in tl:\n"
            "        await update.message.reply_text(" + q + "\u041e\u0442\u043f\u0440\u0430\u0432\u044c\u0442\u0435 \u0444\u043e\u0442\u043e \u0432\u0430\u0448\u0435\u0433\u043e \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0430 \u0430\u043d\u0430\u043b\u0438\u0437\u0430." + q + ")\n"
            "        return\n"
            "    if " + q + "\u043e\u0446\u0435\u043d\u043a\u0430" + q + " in tl:\n"
