name: Fix Bot Files

on:
  push:
    branches: [ main, master ]

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite files via Python
        run: |
          python3 - << 'EOF'
          import os

          q = chr(34)
          sq = chr(39)
          ru = lambda s: s

          files = {}

          files["config.py"] = (
            "import os\n"
            "from dotenv import load_dotenv\n"
            "\n"
            "load_dotenv()\n"
            "\n"
            "TELEGRAM_TOKEN = os.getenv(" + q + "TELEGRAM_TOKEN" + q + ")\n"
            "ANTHROPIC_API_KEY = os.getenv(" + q + "ANTHROPIC_API_KEY" + q + ")\n"
            "DATABASE_PATH = " + q + "health_bot.db" + q + "\n"
            "CLAUDE_MODEL = " + q + "claude-opus-4-5" + q + "\n"
            "MAX_TOKENS = 2048\n"
          )

          files["requirements.txt"] = (
            "python-telegram-bot==21.6\n"
            "anthropic==0.34.0\n"
            "python-dotenv==1.0.1\n"
          )

          files["Procfile"] = "worker: python bot.py\n"

          files["database.py"] = (
            "import sqlite3\n"
            "from config import DATABASE_PATH\n"
            "\n"
            "def get_connection():\n"
            "    conn = sqlite3.connect(DATABASE_PATH)\n"
            "    conn.row_factory = sqlite3.Row\n"
            "    return conn\n"
            "\n"
            "def init_db():\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    c.execute(" + q + q + q + "\n"
            "        CREATE TABLE IF NOT EXISTS users (\n"
            "            user_id INTEGER PRIMARY KEY,\n"
            "            username TEXT,\n"
            "            first_name TEXT,\n"
            "            age INTEGER,\n"
            "            gender TEXT,\n"
            "            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n"
            "        )\n"
            "    " + q + q + q + ")\n"
            "    c.execute(" + q + q + q + "\n"
            "        CREATE TABLE IF NOT EXISTS health_records (\n"
            "            id INTEGER PRIMARY KEY AUTOINCREMENT,\n"
            "            user_id INTEGER,\n"
            "            record_type TEXT,\n"
            "            value TEXT,\n"
            "            notes TEXT,\n"
            "            recorded_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n"
            "            FOREIGN KEY (user_id) REFERENCES users(user_id)\n"
            "        )\n"
            "    " + q + q + q + ")\n"
            "    c.execute(" + q + q + q + "\n"
            "        CREATE TABLE IF NOT EXISTS conversations (\n"
            "            id INTEGER PRIMARY KEY AUTOINCREMENT,\n"
            "            user_id INTEGER,\n"
            "            role TEXT,\n"
            "            content TEXT,\n"
            "            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n"
            "            FOREIGN KEY (user_id) REFERENCES users(user_id)\n"
            "        )\n"
            "    " + q + q + q + ")\n"
            "    conn.commit()\n"
            "    conn.close()\n"
            "\n"
            "def save_user(user_id, username, first_name):\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    c.execute(\n"
            "        " + q + "INSERT OR IGNORE INTO users (user_id, username, first_name) VALUES (?, ?, ?)" + q + ",\n"
            "        (user_id, username, first_name)\n"
            "    )\n"
            "    conn.commit()\n"
            "    conn.close()\n"
            "\n"
            "def save_health_record(user_id, record_type, value, notes=" + q + q + "):\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    c.execute(\n"
            "        " + q + "INSERT INTO health_records (user_id, record_type, value, notes) VALUES (?, ?, ?, ?)" + q + ",\n"
            "        (user_id, record_type, value, notes)\n"
            "    )\n"
            "    conn.commit()\n"
            "    conn.close()\n"
            "\n"
            "def get_health_records(user_id, record_type=None, limit=10):\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    if record_type:\n"
            "        c.execute(\n"
            "            " + q + "SELECT * FROM health_records WHERE user_id=? AND record_type=? ORDER BY recorded_at DESC LIMIT ?" + q + ",\n"
            "            (user_id, record_type, limit)\n"
            "        )\n"
            "    else:\n"
            "        c.execute(\n"
            "            " + q + "SELECT * FROM health_records WHERE user_id=? ORDER BY recorded_at DESC LIMIT ?" + q + ",\n"
            "            (user_id, limit)\n"
            "        )\n"
            "    rows = c.fetchall()\n"
            "    conn.close()\n"
            "    return rows\n"
            "\n"
            "def save_conversation(user_id, role, content):\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    c.execute(\n"
            "        " + q + "INSERT INTO conversations (user_id, role, content) VALUES (?, ?, ?)" + q + ",\n"
            "        (user_id, role, content)\n"
            "    )\n"
            "    conn.commit()\n"
            "    conn.close()\n"
            "\n"
            "def get_conversation_history(user_id, limit=20):\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    c.execute(\n"
            "        " + q + "SELECT role, content FROM conversations WHERE user_id=? ORDER BY created_at DESC LIMIT ?" + q + ",\n"
            "        (user_id, limit)\n"
            "    )\n"
            "    rows = c.fetchall()\n"
            "    conn.close()\n"
            "    return list(reversed(rows))\n"
            "\n"
            "def get_user_info(user_id):\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    c.execute(" + q + "SELECT * FROM users WHERE user_id=?" + q + ", (user_id,))\n"
            "    user = c.fetchone()\n"
            "    conn.close()\n"
            "    return user\n"
            "\n"
            "def update_user_info(user_id, age=None, gender=None):\n"
            "    conn = get_connection()\n"
            "    c = conn.cursor()\n"
            "    if age is not None:\n"
            "        c.execute(" + q + "UPDATE users SET age=? WHERE user_id=?" + q + ", (age, user_id))\n"
            "    if gender is not None:\n"
            "        c.execute(" + q + "UPDATE users SET gender=? WHERE user_id=?" + q + ", (gender, user_id))\n"
            "    conn.commit()\n"
            "    conn.close()\n"
          )

          files["claude_client.py"] = (
            "import anthropic\n"
            "import base64\n"
            "from config import ANTHROPIC_API_KEY, CLAUDE_MODEL, MAX_TOKENS\n"
            "\n"
            "client = anthropic.Anthropic(api_key=ANTHROPIC_API_KEY)\n"
            "\n"
            "SYSTEM_PROMPT = " + q + q + q + "\n"
            "You are an AI health assistant and personal doctor for Russian-speaking users.\n"
            "ALWAYS respond in Russian, regardless of what language the user writes in.\n"
            "\n"
            "You help users:\n"
            "- Track their weight, nutrition, and physical activity\n"
            "- Analyze medical test results from photos\n"
            "- Create health screening plans based on age and gender\n"
            "- Assess overall health on a scale of 1-10\n"
            "- Answer medical questions\n"
            "\n"
            "Important rules:\n"
            "- ALWAYS write in Russian\n"
            "- Always remind users that you are an AI and cannot replace a real doctor\n"
            "- For serious symptoms, always recommend consulting a doctor\n"
            "- Be empathetic, warm, and supportive\n"
            "- Use simple language, avoid complex medical terms without explanation\n"
            "- When assessing health score, explain what each point means\n"
            + q + q + q + "\n"
            "\n"
            "def chat_with_claude(messages, user_info=None):\n"
            "    system = SYSTEM_PROMPT\n"
            "    if user_info and (user_info[" + q + "age" + q + "] or user_info[" + q + "gender" + q + "]):\n"
            "        age = user_info[" + q + "age" + q + "] or " + q + "не указан" + q + "\n"
            "        gender = user_info[" + q + "gender" + q + "] or " + q + "не указан" + q + "\n"
            "        system += " + q + "\\n\\nПрофиль пользователя: возраст " + q + " + str(age) + " + q + ", пол: " + q + " + str(gender)\n"
            "    response = client.messages.create(\n"
            "        model=CLAUDE_MODEL,\n"
            "        max_tokens=MAX_TOKENS,\n"
            "        system=system,\n"
            "        messages=messages\n"
            "    )\n"
            "    return response.content[0].text\n"
            "\n"
            "def analyze_medical_image(image_data, image_type=" + q + "jpeg" + q + ", user_message=" + q + q + "):\n"
            "    if isinstance(image_data, bytes):\n"
            "        image_b64 = base64.standard_b64encode(image_data).decode(" + q + "utf-8" + q + ")\n"
            "    else:\n"
            "        image_b64 = image_data\n"
            "    prompt = user_message if user_message else " + q + "Проанализируй этот медицинский документ или результат анализа. Объясни значения на русском языке и укажи, если что-то требует внимания." + q + "\n"
            "    response = client.messages.create(\n"
            "        model=CLAUDE_MODEL,\n"
            "        max_tokens=MAX_TOKENS,\n"
            "        system=SYSTEM_PROMPT,\n"
            "        messages=[{\n"
            "            " + q + "role" + q + ": " + q + "user" + q + ",\n"
            "            " + q + "content" + q + ": [\n"
            "                {" + q + "type" + q + ": " + q + "image" + q + ", " + q + "source" + q + ": {" + q + "type" + q + ": " + q + "base64" + q + ", " + q + "media_type" + q + ": " + q + "image/" + q + " + image_type, " + q + "data" + q + ": image_b64}},\n"
            "                {" + q + "type" + q + ": " + q + "text" + q + ", " + q + "text" + q + ": prompt}\n"
            "            ]\n"
            "        }]\n"
            "    )\n"
            "    return response.content[0].text\n"
          )

          files["bot.py"] = (
            "import logging\n"
            "from telegram import Update, ReplyKeyboardMarkup, KeyboardButton\n"
            "from telegram.ext import (\n"
            "    Application, CommandHandler, MessageHandler,\n"
            "    filters, ContextTypes, ConversationHandler\n"
            ")\n"
            "from config import TELEGRAM_TOKEN\n"
            "from database import (\n"
            "    init_db, save_user, save_health_record, get_health_records,\n"
            "    save_conversation, get_conversation_history,\n"
            "    get_user_info, update_user_info\n"
            ")\n"
            "from claude_client import chat_with_claude, analyze_medical_image\n"
            "\n"
            "logging.basicConfig(\n"
            "    format=" + q + "%(asctime)s - %(name)s - %(levelname)s - %(message)s" + q + ",\n"
            "    level=logging.INFO\n"
            ")\n"
            "logger = logging.getLogger(__name__)\n"
            "\n"
            "SETTING_AGE, SETTING_GENDER = range(2)\n"
            "\n"
            "MAIN_KB = ReplyKeyboardMarkup([\n"
            "    [KeyboardButton(" + q + "\u2696\ufe0f \u0412\u0435\u0441" + q + "), KeyboardButton(" + q + "\ud83e\udd57 \u041f\u0438\u0442\u0430\u043d\u0438\u0435" + q + ")],\n"
            "    [KeyboardButton(" + q + "\ud83c\udfcb\ufe0f \u0410\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c" + q + "), KeyboardButton(" + q + "\ud83d\udd2c \u0410\u043d\u0430\u043b\u0438\u0437\u044b" + q + ")],\n"
            "    [KeyboardButton(" + q + "\ud83d\udcca \u041e\u0446\u0435\u043d\u043a\u0430 \u0437\u0434\u043e\u0440\u043e\u0432\u044c\u044f" + q + "), KeyboardButton(" + q + "\ud83d\udcc5 \u041f\u043b\u0430\u043d \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0439" + q + ")],\n"
            "    [KeyboardButton(" + q + "\ud83d\udc64 \u041c\u043e\u0439 \u043f\u0440\u043e\u0444\u0438\u043b\u044c" + q + "), KeyboardButton(" + q + "\ud83d\udcdd \u0418\u0441\u0442\u043e\u0440\u0438\u044f" + q + ")]\n"
            "], resize_keyboard=True)\n"
            "\n"
            "async def start(update: Update, context: ContextTypes.DEFAULT_TYPE):\n"
            "    user = update.effective_user\n"
            "    save_user(user.id, user.username, user.first_name)\n"
            "    text = (\n"
            "        " + q + "\ud83d\udc68\u200d\u2695\ufe0f \u0417\u0434\u0440\u0430\u0432\u0441\u0442\u0432\u0443\u0439\u0442\u0435, " + q + " + user.first_name + " + q + "!\\n\\n" + q + "\n"
            "        " + q + "\u042f \u0432\u0430\u0448 \u043b\u0438\u0447\u043d\u044b\u0439 \u0418\u0418-\u0434\u043e\u043a\u0442\u043e\u0440. \u041c\u043e\u0433\u0443 \u043f\u043e\u043c\u043e\u0447\u044c:\\n\\n" + q + "\n"
            "        " + q + "\u2696\ufe0f \u041e\u0442\u0441\u043b\u0435\u0436\u0438\u0432\u0430\u0442\u044c \u0432\u0435\u0441, \u043f\u0438\u0442\u0430\u043d\u0438\u0435, \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c\\n" + q + "\n"
            "        " + q + "\ud83d\udd2c \u0420\u0430\u0441\u0448\u0438\u0444\u0440\u043e\u0432\u044b\u0432\u0430\u0442\u044c \u043c\u0435\u0434\u0438\u0446\u0438\u043d\u0441\u043a\u0438\u0435 \u0430\u043d\u0430\u043b\u0438\u0437\u044b \u043f\u043e \u0444\u043e\u0442\u043e\\n" + q + "\n"
            "        " + q + "\ud83d\udcc5 \u0421\u043e\u0441\u0442\u0430\u0432\u043b\u044f\u0442\u044c \u043f\u043b\u0430\u043d \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0439\\n" + q + "\n"
            "        " + q + "\ud83d\udcca \u041e\u0446\u0435\u043d\u0438\u0432\u0430\u0442\u044c \u0437\u0434\u043e\u0440\u043e\u0432\u044c\u0435 \u043f\u043e \u0448\u043a\u0430\u043b\u0435 1-10\\n\\n" + q + "\n"
            "        " + q + "\u2757\ufe0f \u042f \u044f\u0432\u043b\u044f\u044e\u0441\u044c \u0418\u0418-\u0430\u0441\u0441\u0438\u0441\u0442\u0435\u043d\u0442\u043e\u043c \u0438 \u043d\u0435 \u0437\u0430\u043c\u0435\u043d\u044f\u044e \u0440\u0435\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0432\u0440\u0430\u0447\u0430." + q + "\n"
            "    )\n"
            "    await update.message.reply_text(text, reply_markup=MAIN_KB)\n"
            "\n"
            "async def handle_health_score(update: Update, context: ContextTypes.DEFAULT_TYPE):\n"
            "    user_id = update.effective_user.id\n"
            "    records = get_health_records(user_id, limit=20)\n"
            "    history = get_conversation_history(user_id, limit=10)\n"
            "    user_info = get_user_info(user_id)\n"
            "    records_text = " + q + q + "\n"
            "    for r in records[:10]:\n"
            "        records_text += " + q + "- " + q + " + r[" + q + "record_type" + q + "] + " + q + ": " + q + " + r[" + q + "value" + q + "] + " + q + "\\n" + q + "\n"
            "    msgs = [{" + q + "role" + q + ": m[" + q + "role" + q + "], " + q + "content" + q + ": m[" + q + "content" + q + "]} for m in history[-6:]]\n"
            "    msgs.append({" + q + "role" + q + ": " + q + "user" + q + ", " + q + "content" + q + ": " + q + "\u041e\u0446\u0435\u043d\u0438 \u043c\u043e\u0451 \u0437\u0434\u043e\u0440\u043e\u0432\u044c\u0435 \u043f\u043e \u0448\u043a\u0430\u043b\u0435 1-10 \u043d\u0430 \u043e\u0441\u043d\u043e\u0432\u0435 \u0434\u0430\u043d\u043d\u044b\u0445:\\n" + q + " + (records_text or " + q + "\u0414\u0430\u043d\u043d\u044b\u0445 \u043f\u043e\u043a\u0430 \u043d\u0435\u0442" + q + ")})\n"
            "    response = chat_with_claude(msgs, user_info)\n"
            "    await update.message.reply_text(response, reply_markup=MAIN_KB)\n"
            "\n"
            "async def handle_screening_plan(update: Update, context: ContextTypes.DEFAULT_TYPE):\n"
            "    user_id = update.effective_user.id\n"
            "    user_info = get_user_info(user_id)\n"
            "    if not user_info or not user_info[" + q + "age" + q + "] or not user_info[" + q + "gender" + q + "]:\n"
            "        await update.message.reply_text(\n"
            "            " + q + "\u041f\u043e\u0436\u0430\u043b\u0443\u0439\u0441\u0442\u0430, \u0441\u043d\u0430\u0447\u0430\u043b\u0430 \u0443\u043a\u0430\u0436\u0438\u0442\u0435 \u0432\u043e\u0437\u0440\u0430\u0441\u0442 \u0438 \u043f\u043e\u043b \u0432 \u043f\u0440\u043e\u0444\u0438\u043b\u0435.\\n\u0418\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0439\u0442\u0435 \u043a\u043e\u043c\u0430\u043d\u0434\u044b /setage \u0438 /setgender" + q + "\n"
            "        )\n"
            "        return\n"
            "    msgs = [{\n"
            "        " + q + "role" + q + ": " + q + "user" + q + ",\n"
            "        " + q + "content" + q + ": " + q + "\u0421\u043e\u0441\u0442\u0430\u0432\u044c \u043f\u043b\u0430\u043d \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0439 \u0434\u043b\u044f \u0447\u0435\u043b\u043e\u0432\u0435\u043a\u0430: \u0432\u043e\u0437\u0440\u0430\u0441\u0442 " + q + " + str(user_info[" + q + "age" + q + "]) + " + q + " \u043b\u0435\u0442, \u043f\u043e\u043b: " + q + " + str(user_info[" + q + "gender" + q + "])\n"
            "    }]\n"
            "    response = chat_with_claude(msgs, user_info)\n"
            "    save_conversation(user_id, " + q + "user" + q + ", " + q + "\u041f\u043b\u0430\u043d \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0439" + q + ")\n"
            "    save_conversation(user_id, " + q + "assistant" + q + ", response)\n"
            "    await update.message.reply_text(response, reply_markup=MAIN_KB)\n"
            "\n"
            "async def handle_profile(update: Update, context: ContextTypes.DEFAULT_TYPE):\n"
            "    user_id = update.effective_user.id\n"
            "    u = get_user_info(user_id)\n"
            "    text = (\n"
            "        " + q + "\ud83d\udc64 \u0412\u0430\u0448 \u043f\u0440\u043e\u0444\u0438\u043b\u044c:\\n\\n" + q + "\n"
            "        " + q + "\u0418\u043c\u044f: " + q + " + (u[" + q + "first_name" + q + "] if u else " + q + "\u041d\u0435\u0438\u0437\u0432\u0435\u0441\u0442\u043d\u043e" + q + ") + " + q + "\\n" + q + "\n"
            "        " + q + "\u0412\u043e\u0437\u0440\u0430\u0441\u0442: " + q + " + str(u[" + q + "age" + q + "] if u and u[" + q + "age" + q + "] else " + q + "\u041d\u0435 \u0443\u043a\u0430\u0437\u0430\u043d" + q + ") + " + q + "\\n" + q + "\n"
            "        " + q + "\u041f\u043e\u043b: " + q + " + str(u[" + q + "gender" + q + "] if u and u[" + q + "gender" + q + "] else " + q + "\u041d\u0435 \u0443\u043a\u0430\u0437\u0430\u043d" + q + ") + " + q + "\\n\\n" + q + "\n"
            "        " + q + "\u0414\u043b\u044f \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u044f: /setage \u0438 /setgender" + q + "\n"
            "    )\n"
            "    await update.message.reply_text(text, reply_markup=MAIN_KB)\n"
            "\n"
            "async def handle_history(update: Update, context: ContextTypes.DEFAULT_TYPE):\n"
            "    user_id = update.effective_user.id\n"
            "    records = get_health_records(user_id, limit=10)\n"
            "    if not records:\n"
            "        await update.message.reply_text(" + q + "\u0417\u0430\u043f\u0438\u0441\u0435\u0439 \u043f\u043e\u043a\u0430 \u043d\u0435\u0442." + q + ", reply_markup=MAIN_KB)\n"
            "        return\n"
            "    text = " + q + "\ud83d\udcdd \u0412\u0430\u0448\u0438 \u043f\u043e\u0441\u043b\u0435\u0434\u043d\u0438\u0435 \u0437\u0430\u043f\u0438\u0441\u0438:\\n\\n" + q + "\n"
            "    for r in records:\n"
            "        text += str(r[" + q + "recorded_at" + q + "])[:10] + " + q + " \u2014 " + q + " + r[" + q + "record_type" + q + "] + " + q + ": " + q + " + r[" + q + "value" + q + "] + " + q + "\\n" + q + "\n"
