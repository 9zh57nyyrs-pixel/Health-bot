          # claude_client.py
          cat > claude_client.py << 'ENDOFFILE'
import anthropic
import base64
from config import ANTHROPIC_API_KEY, CLAUDE_MODEL, MAX_TOKENS

client = anthropic.Anthropic(api_key=ANTHROPIC_API_KEY)

SYSTEM_PROMPT = """You are an AI health assistant and personal doctor. You help users:
- Track their weight, nutrition, and physical activity
- Analyze medical test results from photos
- Create health screening plans based on age and gender
- Assess overall health on a scale of 1-10
- Provide general health advice and answer medical questions

Important guidelines:
- Always remind users that you are an AI and cannot replace a real doctor
- For serious symptoms, always recommend consulting a healthcare professional
- Be empathetic, clear, and supportive
- Respond in the same language the user writes in
- Keep responses concise but informative"""


def chat_with_claude(messages, user_info=None):
    system = SYSTEM_PROMPT
    if user_info and (user_info["age"] or user_info["gender"]):
        age = user_info["age"] or "unknown"
        gender = user_info["gender"] or "unknown"
        system += f"\n\nUser profile: Age {age}, Gender: {gender}"

    response = client.messages.create(
        model=CLAUDE_MODEL,
        max_tokens=MAX_TOKENS,
        system=system,
        messages=messages
    )
    return response.content[0].text


def analyze_medical_image(image_data, image_type="jpeg", user_message=""):
    if isinstance(image_data, bytes):
        image_b64 = base64.standard_b64encode(image_data).decode("utf-8")
    else:
        image_b64 = image_data

    prompt = user_message if user_message else "Please analyze this medical document or test result. Explain what the values mean and if anything requires attention."

    response = client.messages.create(
        model=CLAUDE_MODEL,
        max_tokens=MAX_TOKENS,
        system=SYSTEM_PROMPT,
        messages=[
            {
                "role": "user",
                "content": [
                    {
                        "type": "image",
                        "source": {
                            "type": "base64",
                            "media_type": f"image/{image_type}",
                            "data": image_b64
                        }
                    },
                    {
                        "type": "text",
                        "text": prompt
                    }
                ]
            }
        ]
    )
    return response.content[0].text
ENDOFFILE

          # bot.py
          cat > bot.py << 'ENDOFFILE'
import logging
from telegram import Update, ReplyKeyboardMarkup, KeyboardButton
from telegram.ext import (
    Application,
    CommandHandler,
    MessageHandler,
    filters,
    ContextTypes,
    ConversationHandler
)
from config import TELEGRAM_TOKEN
from database import init_db, save_user, save_health_record, get_health_records, save_conversation, get_conversation_history, get_user_info, update_user_info
from claude_client import chat_with_claude, analyze_medical_image

logging.basicConfig(
    format="%(asctime)s - %(name)s - %(levelname)s - %(message)s",
    level=logging.INFO
)
logger = logging.getLogger(__name__)

SETTING_AGE, SETTING_GENDER = range(2)

MAIN_KEYBOARD = ReplyKeyboardMarkup([
    [KeyboardButton("Weight"), KeyboardButton("Nutrition")],
    [KeyboardButton("Activity"), KeyboardButton("Analysis")],
    [KeyboardButton("Health Score"), KeyboardButton("Screening Plan")],
    [KeyboardButton("My Profile"), KeyboardButton("History")]
], resize_keyboard=True)


async def start(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user = update.effective_user
    save_user(user.id, user.username, user.first_name)
    welcome_text = (
        f"Hello, {user.first_name}! I am your personal AI health assistant.\n\n"
        "I can help you:\n"
        "Track weight, nutrition, activity\n"
        "Analyze medical tests from photos\n"
        "Create a health screening plan\n"
        "Assess your health score\n\n"
        "Use the menu below or just write to me in free form.\n\n"
        "Remember: I am an AI assistant and cannot replace a real doctor."
    )
    await update.message.reply_text(welcome_text, reply_markup=MAIN_KEYBOARD)


async def handle_weight(update: Update, context: ContextTypes.DEFAULT_TYPE):
    await update.message.reply_text(
        "Please enter your weight in kg (for example: 70.5):"
    )
    context.user_data["expecting"] = "weight"


async def handle_nutrition(update: Update, context: ContextTypes.DEFAULT_TYPE):
    await update.message.reply_text(
        "Describe what you ate today or a specific meal:"
    )
    context.user_data["expecting"] = "nutrition"


async def handle_activity(update: Update, context: ContextTypes.DEFAULT_TYPE):
    await update.message.reply_text(
        "Describe your physical activity (type, duration, intensity):"
    )
    context.user_data["expecting"] = "activity"


async def handle_health_score(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    records = get_health_records(user_id, limit=20)
    history = get_conversation_history(user_id, limit=10)
    user_info = get_user_info(user_id)

    records_text = ""
    if records:
        for r in records[:10]:
            records_text += f"- {r['record_type']}: {r['value']}\n"

    messages = history[-6:] if len(history) > 6 else history
    messages = [{"role": m["role"], "content": m["content"]} for m in messages]
    messages.append({
        "role": "user",
        "content": f"Based on the health data below, assess my health on a scale of 1-10 and provide recommendations.\n\nRecent records:\n{records_text if records_text else 'No data yet'}"
    })

    response = chat_with_claude(messages, user_info)
    await update.message.reply_text(response, reply_markup=MAIN_KEYBOARD)


async def handle_screening_plan(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    user_info = get_user_info(user_id)

    if not user_info or not user_info["age"] or not user_info["gender"]:
        await update.message.reply_text(
            "To create a personal screening plan, I need to know your age and gender.\n"
            "Please set up your profile using /profile"
        )
        return

    messages = [{
        "role": "user",
        "content": f"Create a health screening plan for a person: age {user_info['age']}, gender {user_info['gender']}. List which tests, examinations and preventive measures are recommended and at what frequency."
    }]

    response = chat_with_claude(messages, user_info)
    save_conversation(user_id, "user", "Screening plan request")
    save_conversation(user_id, "assistant", response)
    await update.message.reply_text(response, reply_markup=MAIN_KEYBOARD)


async def handle_profile(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    user_info = get_user_info(user_id)

    profile_text = "Your profile:\n"
    profile_text += f"Name: {user_info['first_name'] if user_info else 'Unknown'}\n"
    profile_text += f"Age: {user_info['age'] if user_info and user_info['age'] else 'Not set'}\n"
    profile_text += f"Gender: {user_info['gender'] if user_info and user_info['gender'] else 'Not set'}\n\n"
    profile_text += "To update, use /setage and /setgender commands"

    await update.message.reply_text(profile_text, reply_markup=MAIN_KEYBOARD)


async def handle_history(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    records = get_health_records(user_id, limit=10)

    if not records:
        await update.message.reply_text("No health records yet.", reply_markup=MAIN_KEYBOARD)
        return

    history_text = "Your recent health records:\n\n"
    for r in records:
        history_text += f"{r['recorded_at'][:10]} - {r['record_type']}: {r['value']}\n"
        if r["notes"]:
            history_text += f"  Notes: {r['notes']}\n"

    await update.message.reply_text(history_text, reply_markup=MAIN_KEYBOARD)


async def set_age(update: Update, context: ContextTypes.DEFAULT_TYPE):
    await update.message.reply_text("Please enter your age:")
    return SETTING_AGE


async def receive_age(update: Update, context: ContextTypes.DEFAULT_TYPE):
    try:
        age = int(update.message.text.strip())
        if 1 <= age <= 120:
            update_user_info(update.effective_user.id, age=age)
            await update.message.reply_text(f"Age saved: {age} years", reply_markup=MAIN_KEYBOARD)
        else:
            await update.message.reply_text("Please enter a valid age (1-120)")
            return SETTING_AGE
    except ValueError:
        await update.message.reply_text("Please enter a number")
        return SETTING_AGE
    return ConversationHandler.END


async def set_gender(update: Update, context: ContextTypes.DEFAULT_TYPE):
    keyboard = ReplyKeyboardMarkup(
        [[KeyboardButton("Male"), KeyboardButton("Female")]],
        resize_keyboard=True,
        one_time_keyboard=True
    )
    await update.message.reply_text("Select your gender:", reply_markup=keyboard)
    return SETTING_GENDER


async def receive_gender(update: Update, context: ContextTypes.DEFAULT_TYPE):
    gender = update.message.text.strip().lower()
    if gender in ["male", "female"]:
        update_user_info(update.effective_user.id, gender=gender)
        await update.message.reply_text(f"Gender saved: {gender}", reply_markup=MAIN_KEYBOARD)
    else:
        await update.message.reply_text("Please select Male or Female")
        return SETTING_GENDER
    return ConversationHandler.END


async def handle_photo(update: Update, context: ContextTypes.DEFAULT_TYPE):
    await update.message.reply_text("Analyzing the image, please wait...")

    photo = update.message.photo[-1]
    file = await context.bot.get_file(photo.file_id)
    image_bytes = await file.download_as_bytearray()

    caption = update.message.caption or ""

    try:
        response = analyze_medical_image(bytes(image_bytes), "jpeg", caption)
        user_id = update.effective_user.id
        save_conversation(user_id, "user", f"[Image sent] {caption}")
        save_conversation(user_id, "assistant", response)
        await update.message.reply_text(response, reply_markup=MAIN_KEYBOARD)
    except Exception as e:
        logger.error(f"Error analyzing image: {e}")
        await update.message.reply_text(
            "Failed to analyze the image. Please try again.",
            reply_markup=MAIN_KEYBOARD
        )


async def handle_text(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    text = update.message.text
    user_info = get_user_info(user_id)

    button_handlers = {
        "weight": handle_weight,
        "nutrition": handle_nutrition,
        "activity": handle_activity,
        "analysis": handle_analysis_prompt,
        "health score": handle_health_score,
        "screening plan": handle_screening_plan,
        "my profile": handle_profile,
        "history": handle_history
    }

    text_lower = text.lower()
    if text_lower in button_handlers:
        await button_handlers[text_lower](update, context)
        return

    expecting = context.user_data.get("expecting")
    if expecting in ["weight", "nutrition", "activity"]:
        save_health_record(user_id, expecting, text)
        context.user_data.pop("expecting", None)

        messages = get_conversation_history(user_id, limit=10)
        messages = [{"role": m["role"], "content": m["content"]} for m in messages]
        messages.append({
            "role": "user",
            "content": f"I recorded my {expecting}: {text}. Please comment briefly and give advice if needed."
        })

        response = chat_with_claude(messages, user_info)
        save_conversation(user_id, "user", f"{expecting}: {text}")
        save_conversation(user_id, "assistant", response)
        await update.message.reply_text(response, reply_markup=MAIN_KEYBOARD)
        return

    history = get_conversation_history(user_id, limit=20)
    messages = [{"role": m["role"], "content": m["content"]} for m in history]
    messages.append({"role": "user", "content": text})

    save_conversation(user_id, "user", text)

    try:
        response = chat_with_claude(messages, user_info)
        save_conversation(user_id, "assistant", response)
        await update.message.reply_text(response, reply_markup=MAIN_KEYBOARD)
    except Exception as e:
        logger.error(f"Error calling Claude API: {e}")
        await update.message.reply_text(
            "Sorry, an error occurred. Please try again later.",
            reply_markup=MAIN_KEYBOARD
        )


async def handle_analysis_prompt(update: Update, context: ContextTypes.DEFAULT_TYPE):
    await update.message.reply_text(
        "Send a photo of your medical test or analysis result, "
        "and I will help you understand the values."
    )


def main():
    init_db()

    app = Application.builder().token(TELEGRAM_TOKEN).build()

    age_conv = ConversationHandler(
        entry_points=[CommandHandler("setage", set_age)],
        states={SETTING_AGE: [MessageHandler(filters.TEXT & ~filters.COMMAND, receive_age)]},
        fallbacks=[]
    )

    gender_conv = ConversationHandler(
        entry_points=[CommandHandler("setgender", set_gender)],
        states={SETTING_GENDER: [MessageHandler(filters.TEXT & ~filters.COMMAND, receive_gender)]},
        fallbacks=[]
    )

    app.add_handler(CommandHandler("start", start))
    app.add_handler(CommandHandler("profile", handle_profile))
    app.add_handler(age_conv)
    app.add_handler(gender_conv)
    app.add_handler(MessageHandler(filters.PHOTO, handle_photo))
    app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle_text))

    logger.info("Bot started")
    app.run_polling(allowed_updates=Update.ALL_TYPES)


if __name__ == "__main__":
    main()
